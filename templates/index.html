<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>箱唛生成系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }
        
        .step {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .step-number {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
            margin-right: 20px;
        }
        
        .step-content {
            flex: 1;
        }
        
        .step-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8f0ff;
        }
        
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #666;
            font-size: 1rem;
        }
        
        .upload-text strong {
            color: #667eea;
        }
        
        .file-input {
            display: none;
        }
        
        .file-info {
            display: inline-block;
            background: #e8f0ff;
            padding: 10px 20px;
            border-radius: 8px;
            color: #667eea;
            font-weight: 500;
            margin-top: 15px;
        }
        
        .file-info.success {
            background: #e8f5e9;
            color: #4caf50;
        }
        
        .variables-section {
            margin-top: 20px;
        }
        
        .variable-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .variable-name {
            font-weight: 600;
            color: #333;
            width: 100px;
            font-size: 1.1rem;
        }
        
        .variable-name span {
            color: #667eea;
        }
        
        .arrow {
            margin: 0 15px;
            color: #999;
            font-size: 1.2rem;
        }
        
        .column-select {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            background: white;
        }
        
        .column-select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            flex: 1;
        }
        
        .btn-secondary:hover {
            background: #eee;
        }
        
        .btn-full {
            width: 100%;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #666;
            font-size: 1.1rem;
        }
        
        .result {
            display: none;
            text-align: center;
            padding: 30px;
            background: #e8f5e9;
            border-radius: 12px;
            margin-top: 20px;
        }
        
        .result.show {
            display: block;
        }
        
        .result-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .result-message {
            color: #2e7d32;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .download-link {
            display: inline-block;
            padding: 15px 40px;
            background: #4caf50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .download-link:hover {
            background: #388e3c;
            transform: translateY(-2px);
        }
        
        .preview-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        
        .preview-title {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 15px;
        }
        
        .preview-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #666;
        }
        
        .preview-info strong {
            color: #333;
        }
        
        .error-message {
            display: none;
            padding: 15px;
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .error-message.show {
            display: block;
        }
        
        .instructions {
            background: #fff3e0;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .instructions h4 {
            color: #e65100;
            margin-bottom: 10px;
        }
        
        .instructions ul {
            margin-left: 20px;
            color: #666;
            line-height: 1.8;
        }
        
        @media (max-width: 600px) {
            .variable-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .variable-name {
                margin-bottom: 10px;
            }
            
            .arrow {
                margin: 10px 0;
                text-align: center;
            }
            
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 箱唛生成系统</h1>
            <p>上传Excel数据和Word模板，自动生成批量箱唛文档</p>
        </div>
        
        <!-- 步骤1：上传文件 -->
        <div class="card">
            <div class="step">
                <div class="step-number">1</div>
                <div class="step-content">
                    <div class="step-title">上传文件</div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label style="display: block; margin-bottom: 10px; color: #333; font-weight: 500;">Excel 数据文件</label>
                            <div class="upload-area" id="excelUpload" onclick="document.getElementById('excelInput').click()">
                                <div class="upload-icon">📊</div>
                                <div class="upload-text">
                                    点击或拖拽上传<br>
                                    <strong>Excel 文件</strong> (.xlsx, .xls)
                                </div>
                                <input type="file" class="file-input" id="excelInput" accept=".xlsx,.xls">
                                <div class="file-info" id="excelFileName" style="display: none;"></div>
                            </div>
                        </div>
                        
                        <div>
                            <label style="display: block; margin-bottom: 10px; color: #333; font-weight: 500;">Word 模板文件</label>
                            <div class="upload-area" id="templateUpload" onclick="document.getElementById('templateInput').click()">
                                <div class="upload-icon">📄</div>
                                <div class="upload-text">
                                    点击或拖拽上传<br>
                                    <strong>Word 模板</strong> (.docx)
                                </div>
                                <input type="file" class="file-input" id="templateInput" accept=".docx">
                                <div class="file-info" id="templateFileName" style="display: none;"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="error-message" id="uploadError"></div>
                </div>
            </div>
        </div>
        
        <!-- 步骤2：配置变量映射 -->
        <div class="card" id="mappingSection" style="display: none;">
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-content">
                    <div class="step-title">配置变量映射</div>
                    <p style="color: #666; margin-bottom: 20px;">
                        将Word模板中的变量与Excel列进行对应匹配
                    </p>
                    
                    <div id="variablesContainer">
                        <!-- 动态生成的变量映射行 -->
                    </div>
                    
                    <div class="preview-section">
                        <div class="preview-title">📋 数据预览</div>
                        <div class="preview-info" id="previewInfo">
                            共 <strong id="rowCount">0</strong> 行数据待生成
                        </div>
                    </div>
                    
                    <div class="instructions">
                        <h4>💡 使用说明</h4>
                        <ul>
                            <li>Word模板中的变量格式为【变量名】，例如：【A】【B】【C】</li>
                            <li>请从下拉框中选择对应的Excel列名进行映射</li>
                            <li>映射关系会自动保存，无需重复配置</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 步骤3：生成文档 -->
        <div class="card" id="generateSection" style="display: none;">
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-content">
                    <div class="step-title">生成箱唛文档</div>
                    
                    <div class="btn-group">
                        <button class="btn btn-primary btn-full" id="generateSingleBtn" onclick="generateDocument('single')">
                            📄 生成单个Word文档<br>
                            <small style="font-weight: normal; opacity: 0.9;">（多页合并为一个文件）</small>
                        </button>
                        
                        <button class="btn btn-secondary btn-full" id="generateZipBtn" onclick="generateDocument('zip')">
                            📦 生成ZIP压缩包<br>
                            <small style="font-weight: normal;">（每个箱唛单独一个文件）</small>
                        </button>
                    </div>
                    
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <div class="loading-text">正在生成箱唛文档，请稍候...</div>
                    </div>
                    
                    <div class="result" id="result">
                        <div class="result-icon">✅</div>
                        <div class="result-message" id="resultMessage"></div>
                        <a class="download-link" id="downloadLink" href="#" download>
                            ⬇️ 点击下载文件
                        </a>
                        <div style="margin-top: 15px;">
                            <button class="btn btn-secondary" onclick="resetForm()">
                                🔄 重新开始
                            </button>
                        </div>
                    </div>
                    
                    <div class="error-message" id="generateError"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let excelColumns = [];
        let variables = [];
        
        // 文件上传处理
        function setupFileUpload(inputId, uploadId, fileNameId, fileType) {
            const input = document.getElementById(inputId);
            const uploadArea = document.getElementById(uploadId);
            const fileNameDiv = document.getElementById(fileNameId);
            
            input.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    handleFile(file, fileNameDiv, uploadArea);
                }
            });
            
            // 拖拽处理
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', function() {
                this.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) {
                    handleFile(file, fileNameDiv, uploadArea);
                }
            });
        }
        
        function handleFile(file, fileNameDiv, uploadArea) {
            fileNameDiv.textContent = '✅ ' + file.name;
            fileNameDiv.style.display = 'inline-block';
            fileNameDiv.classList.add('success');
            uploadArea.style.borderColor = '#4caf50';
            
            checkAndAnalyze();
        }
        
        function setupDragDrop() {
            setupFileUpload('excelInput', 'excelUpload', 'excelFileName', 'excel');
            setupFileUpload('templateInput', 'templateUpload', 'templateFileName', 'template');
        }
        
        async function checkAndAnalyze() {
            const excelInput = document.getElementById('excelInput').files[0];
            const templateInput = document.getElementById('templateInput').files[0];
            
            if (!excelInput || !templateInput) {
                return;
            }
            
            const formData = new FormData();
            formData.append('excel', excelInput);
            formData.append('template', templateInput);
            
            try {
                showError('uploadError', '');
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError('uploadError', data.error);
                    return;
                }
                
                variables = data.variables;
                excelColumns = data.excel_columns;
                
                document.getElementById('rowCount').textContent = data.row_count;
                
                renderVariableMapping();
                
                document.getElementById('mappingSection').style.display = 'block';
                document.getElementById('generateSection').style.display = 'block';
                
            } catch (error) {
                showError('uploadError', '文件分析失败: ' + error.message);
            }
        }
        
        function renderVariableMapping() {
            const container = document.getElementById('variablesContainer');
            container.innerHTML = '';
            
            if (variables.length === 0) {
                container.innerHTML = '<p style="color: #999;">模板中未找到变量</p>';
                return;
            }
            
            variables.forEach(variable => {
                const row = document.createElement('div');
                row.className = 'variable-row';
                
                row.innerHTML = `
                    <div class="variable-name">【<span>${variable}</span>】</div>
                    <div class="arrow">→</div>
                    <select class="column-select" id="mapping_${variable}" name="${variable}">
                        <option value="">-- 选择Excel列 --</option>
                        ${excelColumns.map(col => 
                            `<option value="${col}">${col}</option>`
                        ).join('')}
                    </select>
                `;
                
                container.appendChild(row);
            });
        }
        
        function getVariablesMapping() {
            const mapping = {};
            
            variables.forEach(variable => {
                const select = document.getElementById(`mapping_${variable}`);
                if (select && select.value) {
                    mapping[variable] = select.value;
                }
            });
            
            return mapping;
        }
        
        async function generateDocument(type) {
            const mapping = getVariablesMapping();
            
            // 检查是否所有变量都已映射
            const unmapped = variables.filter(v => !mapping[v]);
            if (unmapped.length > 0) {
                showError('generateError', `请为以下变量选择对应的Excel列: ${unmapped.join(', ')}`);
                return;
            }
            
            document.getElementById('loading').classList.add('show');
            document.getElementById('result').classList.remove('show');
            document.getElementById('generateError').classList.remove('show');
            
            document.getElementById('generateSingleBtn').disabled = true;
            document.getElementById('generateZipBtn').disabled = true;
            
            try {
                const endpoint = type === 'single' ? '/api/generate' : '/api/generate-zip';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ variables_mapping: mapping })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError('generateError', data.error);
                    return;
                }
                
                document.getElementById('resultMessage').textContent = data.message;
                document.getElementById('downloadLink').href = data.download_url;
                document.getElementById('downloadLink').download = data.download_url.split('/').pop();
                document.getElementById('result').classList.add('show');
                
            } catch (error) {
                showError('generateError', '生成失败: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('generateSingleBtn').disabled = false;
                document.getElementById('generateZipBtn').disabled = false;
            }
        }
        
        function showError(elementId, message) {
            const errorDiv = document.getElementById(elementId);
            if (message) {
                errorDiv.textContent = message;
                errorDiv.classList.add('show');
            } else {
                errorDiv.textContent = '';
                errorDiv.classList.remove('show');
            }
        }
        
        function resetForm() {
            document.getElementById('excelInput').value = '';
            document.getElementById('templateInput').value = '';
            document.getElementById('excelFileName').style.display = 'none';
            document.getElementById('templateFileName').style.display = 'none';
            document.getElementById('mappingSection').style.display = 'none';
            document.getElementById('generateSection').style.display = 'none';
            document.getElementById('result').classList.remove('show');
            document.getElementById('uploadError').classList.remove('show');
            document.getElementById('generateError').classList.remove('show');
            
            variables = [];
            excelColumns = [];
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            setupDragDrop();
        });
    </script>
</body>
</html>
